<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Update Immagine</title>
</head>
<body>
    <h2>Aggiorna un'immagine</h2>
    <form id="updateForm" enctype="multipart/form-data">
        <label for="id">ID Immagine:</label>
        <input type="number" id="id" name="id" required><br><br>
        <label for="file">Nuova Immagine:</label>
        <input type="file" id="file" name="file" required><br><br>
        <label for="idAnimale">ID Animale:</label>
        <input type="number" id="idAnimale" name="idAnimale" required><br><br>
        <button type="submit">Aggiorna</button>
    </form>
    <div id="result"></div>
    <script>
    document.getElementById('updateForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const id = document.getElementById('id').value;
        const fileInput = document.getElementById('file');
        const idAnimale = document.getElementById('idAnimale').value;
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        formData.append('idAnimale', idAnimale);
        const response = await fetch(`/immagini/${id}`, {
            method: 'PUT',
            body: formData
        });
        const resultDiv = document.getElementById('result');
        if (response.ok) {
            const data = await response.json();
            resultDiv.innerHTML = '<b>Immagine aggiornata!</b><br>ID: ' + data.id_immagine + '<br>Nome: ' + data.nome;
        } else {
            const error = await response.text();
            resultDiv.innerHTML = '<b>Errore:</b> ' + error;
        }
    });
    </script>
</body>
</html>

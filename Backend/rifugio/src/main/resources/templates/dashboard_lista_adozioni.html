<!DOCTYPE html>
<html lang="en">                                                         
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamoci una zampa</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" /> -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

        <th:block th:replace="fragments/sidebar :: customSidebar"></th:block>

        <div class="main-content">
            <h1 class="page-title">
                Lista Adozioni
            </h1>

            <section class="green-section">
                <a th:href="@{/dashboard/admin/adozioni/save}" class="add-btn">Aggiungi Nuova Adozione</a>
                
                <!-- Sezione Filtri -->
                <div class="filter-container">
                    <div class="filter-header">
                        <i class="fas fa-filter"></i>
                        <h3>Filtri di Ricerca</h3>
                    </div>
                    <form method="get" action="/dashboard/admin/adozioni" class="filter-form">
                        <div class="filter-field">
                            <label for="nomeAnimale">Nome Animale:</label>
                            <input type="text" name="nomeAnimale" id="nomeAnimale" class="filter-select" 
                                   placeholder="Inserisci nome animale..." th:value="${param.nomeAnimale}"
                                   list="nomiAnimali" autocomplete="off">
                            <datalist id="nomiAnimali">
                                <option th:each="animale : ${animaliSuggerimenti}" th:value="${animale.nome}" th:text="${animale.nome + ' (ID: ' + animale.idAnimale + ')'}"></option>
                            </datalist>
                        </div>
                        <div class="filter-field">
                            <label for="nomePersona">Nome/Cognome Persona:</label>
                            <input type="text" name="nomePersona" id="nomePersona" class="filter-select" 
                                   placeholder="Inserisci nome o cognome..." th:value="${param.nomePersona}"
                                   list="nomiPersone" autocomplete="off">
                            <datalist id="nomiPersone">
                                <option th:each="utente : ${utentiSuggerimenti}" 
                                        th:value="${utente.nome + ' ' + utente.cognome}" 
                                        th:text="${utente.nome + ' ' + utente.cognome + ' (' + utente.email + ')'}"></option>
                            </datalist>
                        </div>
                        <div class="filter-field">
                            <label for="dataDa">Data Adozione Da:</label>
                            <input type="date" name="dataDa" id="dataDa" class="filter-select" 
                                   th:value="${param.dataDa}" />
                        </div>
                        <div class="filter-field">
                            <label for="dataA">Data Adozione A:</label>
                            <input type="date" name="dataA" id="dataA" class="filter-select" 
                                   th:value="${param.dataA}" />
                        </div>
                        <div class="filter-actions">
                            <button type="submit" class="btn-filter">
                                <i class="fas fa-search"></i> Filtra
                            </button>
                            <button type="button" onclick="resetFilters()" class="btn-reset">
                                <i class="fas fa-times"></i> Reset
                            </button>
                        </div>
                    </form>
                </div>
                
                <table class="animal-table">
                    <thead>
                        <tr>
                            <th>Id Adozione</th>
                            <th>Id Animale</th>
                            <th>Nome Animale</th>
                            <th>Id Persona</th>
                            <th>Nome e Cognome Persona</th>
                            <th>Data Adozione</th>
                            <th>Step Adozione</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="adozione : ${adozioni}">
                            <td th:text="${adozione.id}">1</td>
                            <td th:text="${adozione.animale.idAnimale}">1</td>
                            <td th:text="${adozione.animale.nome}">1</td>
                            <td th:text="${adozione.persona.id_persona}">1</td>
                            <td th:text="${adozione.persona.nome + ' ' + adozione.persona.cognome}">Mario Rossi</td>
                            <td th:text="${#dates.format(adozione.dataAdozione, 'dd/MM/yyyy')}">1/1/2000</td>
                            <td th:text="${adozione.stepAdozione.nome_step}">Nome Step</td>
                            <td>
                                <a th:href="@{/dashboard/admin/adozioni/dettagli/{id}(id=${adozione.id})}" class="action-icon-btn" title="Visualizza Dettagli">
                                    <i class="fa fa-eye"></i>
                                </a>
                                <a th:href="@{/dashboard/admin/adozioni/update/{id}(id=${adozione.id})}" class="action-icon-btn" title="Modifica">
                                    <i class="fa fa-edit"></i>
                                </a>
                                
                            </td>
                        </tr>
                    </tbody>
                </table>

                
                
            </section>
        </div>

    </body>
    
    <script th:inline="javascript">
        function resetFilters() {
            // Reset tutti i filtri ai valori di default
            document.getElementById('nomeAnimale').value = '';
            document.getElementById('nomePersona').value = '';
            document.getElementById('dataDa').value = '';
            document.getElementById('dataA').value = '';
            
            // Ricarica la pagina senza parametri di filtro
            window.location.href = '/dashboard/admin/adozioni';
        }
        
        // Validazione delle date e autocompletamento
        document.addEventListener('DOMContentLoaded', function() {
            const dataDa = document.getElementById('dataDa');
            const dataA = document.getElementById('dataA');
            const nomeAnimaleInput = document.getElementById('nomeAnimale');
            const nomePersonaInput = document.getElementById('nomePersona');
            
            // Validazione date
            dataDa.addEventListener('change', function() {
                if (dataA.value && dataDa.value > dataA.value) {
                    alert('La data di inizio non può essere successiva alla data di fine');
                    dataDa.value = '';
                }
            });
            
            dataA.addEventListener('change', function() {
                if (dataDa.value && dataA.value < dataDa.value) {
                    alert('La data di fine non può essere precedente alla data di inizio');
                    dataA.value = '';
                }
            });
            
            // Migliora l'autocompletamento per nome animale
            if (nomeAnimaleInput) {
                nomeAnimaleInput.addEventListener('input', function() {
                    // Capitalizza la prima lettera mentre si digita
                    const value = this.value;
                    if (value.length > 0) {
                        this.value = value.charAt(0).toUpperCase() + value.slice(1);
                    }
                });
                
                // Quando si seleziona un'opzione dal datalist, estrae solo il nome
                nomeAnimaleInput.addEventListener('change', function() {
                    const value = this.value;
                    if (value.includes(' (ID: ')) {
                        this.value = value.split(' (ID: ')[0];
                    }
                });
            }
            
            // Migliora l'autocompletamento per nome persona
            if (nomePersonaInput) {
                nomePersonaInput.addEventListener('input', function() {
                    // Capitalizza la prima lettera di ogni parola mentre si digita
                    const words = this.value.split(' ');
                    const capitalizedWords = words.map(word => {
                        if (word.length > 0) {
                            return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
                        }
                        return word;
                    });
                    this.value = capitalizedWords.join(' ');
                });
                
                // Quando si seleziona un'opzione dal datalist, estrae solo il nome
                nomePersonaInput.addEventListener('change', function() {
                    const value = this.value;
                    if (value.includes(' (')) {
                        this.value = value.split(' (')[0];
                    }
                });
            }
        });
    </script>

</html>

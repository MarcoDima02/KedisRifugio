<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8" />
    <title>Diamoci una zampa - Inserisci Animale</title>
    <link rel="icon" type="image/png" href="/images/logo.png">


    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>

<th:block th:replace="fragments/header :: customHeader"></th:block>

<!-- Aggiunta classe "animale-form" per isolare il CSS -->
<section class="filter-section animale-form">
  <!-- Aggiunta classe "animale-form-box" al form -->
  <form th:action="@{/animali/save}" th:object="${animale}" method="post" class="filter-box animale-form-box" novalidate>

    <h2 class="form-title">Inserisci Nuovo Animale</h2>

    <div class="filter-field">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" th:field="*{nome}" required />
    </div>

    <div class="filter-field">
      <label for="sesso">Sesso:</label>
      <select id="sesso" th:field="*{sesso}" required>
        <option value="" disabled selected>Seleziona sesso</option>
        <option value="M">Maschio</option>
        <option value="F">Femmina</option>
      </select>
    </div>

    <div class="filter-field">
      <label for="dataNascita">Data di Nascita:</label>
      <input type="date" id="dataNascita" th:field="*{dataNascita}" required />
    </div>

    <div class="filter-field">
      <label for="dataArrivo">Data di Arrivo:</label>
      <input type="date" id="dataArrivo" th:field="*{dataArrivo}" required />
    </div>

    <div class="filter-field">
      <label for="descrizioneBreve">Descrizione Breve:</label>
      <input type="text" id="descrizioneBreve" th:field="*{descrizioneBreve}" maxlength="50" />

    </div>

    <div class="filter-field">
      <label for="descrizioneLunga">Descrizione Lunga:</label>
      <textarea id="descrizioneLunga" th:field="*{descrizioneLunga}" rows="4" maxlength="200"></textarea>
    </div>

    <div class="filter-field">
      <label for="idStatoAnimale">Stato Animale:</label>
      <select id="idStatoAnimale" th:field="*{idStatoAnimale.idStatoAnimale}" required>
        <option value="" disabled selected>-- Seleziona --</option>
        <option th:each="stato : ${statiAnimali}"
                th:value="${stato.idStatoAnimale}"
                th:text="${stato.descrizione}"></option>
      </select>
    </div>

    <fieldset>
      <legend>Cartella Clinica</legend>

      <div class="filter-field">
        <label for="microchip">Microchip:</label>
        <input type="text" id="microchip" th:field="*{idCartellaClinica.microchip}" />
      </div>

      <div class="filter-field">
        <label for="vaccinazioni">Vaccinazioni (numero):</label>
        <input type="number" id="vaccinazioni" th:field="*{idCartellaClinica.vaccinazioni}" min="0" />
      </div>

      <div class="filter-field">
        <label for="sterilizzato">Sterilizzato:</label>
        <input type="checkbox" id="sterilizzato" th:field="*{idCartellaClinica.sterilizzato}" />
      </div>

      <div class="filter-field">
        <label for="sverminazione">Sverminazione:</label>
        <input type="checkbox" id="sverminazione" th:field="*{idCartellaClinica.sverminazione}" />
      </div>

      <div class="filter-field">
        <label for="trattamentoAntiparassitario">Trattamento Antiparassitario:</label>
        <input type="checkbox" id="trattamentoAntiparassitario" th:field="*{idCartellaClinica.trattamentoAntiparassitario}" />
      </div>
    </fieldset>

    <div class="filter-field">
      <label for="specie">Specie:</label>
      <select id="specie" th:field="*{specie.idSpecie}" required>
        <option value="" disabled selected>-- Seleziona --</option>
        <option th:each="specie : ${specieList}"
                th:value="${specie.IdSpecie}"
                th:text="${specie.nome}"></option>
      </select>
    </div>

    <div class="filter-field">
      <label for="razza">Razza:</label>
      <select name="razza" id="razza">
        <option value="" disabled selected>-- Seleziona --</option>
        <option th:each="razza : ${razzaList}"
                th:value="${razza.idRazza}"
                th:text="${razza.nome}">
        </option>
      </select>
    </div>

    <div class="filter-field" style="display:flex; gap:1rem; justify-content:center; margin-top:1.5rem;">
      <button type="submit">Salva Animale</button>
      <button type="reset" class="secondary">Reset</button>
    </div>

  </form>
</section>

<th:block th:replace="fragments/footer :: customFooter"></th:block>

</body>
</html>

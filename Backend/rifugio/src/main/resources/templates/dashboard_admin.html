<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <!-- Header dinamico -->
    <th:block th:replace="fragments/header :: header"></th:block>

    <div class="container" style="margin-top: 40px;">
        <h1>Dashboard Amministratore</h1>
        <p>Benvenuto, <span th:text="${userName}"></span>!</p>

        <div class="dashboard-actions">
            <a href="/utenti" class="dashboard-btn">Gestione Utenti</a>
            <a href="/animali" class="dashboard-btn">Gestione Animali</a>
            <a href="/donazioni" class="dashboard-btn">Gestione Donazioni</a>
            <a href="/adoptions" class="dashboard-btn">Gestione Adozioni</a>
            <!-- Aggiungi altre sezioni amministrative qui -->
        </div>

        <div class="dashboard-section" style="margin-top: 40px;">
            <h2>Statistiche rapide</h2>
            <ul>
                <li>Utenti registrati: <span th:text="${numUtenti}">0</span></li>
                <li>Animali presenti: <span th:text="${numAnimali}">0</span></li>
                <li>Donazioni totali: <span th:text="${totDonazioni}">0</span> €</li>
                <li>Adozioni concluse: <span th:text="${numAdozioni}">0</span></li>
            </ul>
        </div>
    </div>

    <style>
        .dashboard-actions {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .dashboard-btn {
            padding: 12px 24px;
            background: #2d7a3e;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        .dashboard-btn:hover {
            background: #22602e;
        }
        .dashboard-section ul {
            list-style: none;
            padding: 0;
        }
        .dashboard-section li {
            margin-bottom: 8px;
            font-size: 1.1em;
        }
    </style>
</body>
</html>

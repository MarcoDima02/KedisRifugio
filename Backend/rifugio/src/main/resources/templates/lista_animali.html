<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diamoci una zampa</title>
    <link rel="icon" type="image/png" href="/images/logo.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />

    <link rel="stylesheet" th:href="@{../css/styles.css}" />
</head>

<body>

    <th:block th:replace="fragments/header :: customHeader"></th:block>


    <section class="hero-section">
        <div class="hero-text">
            <p>Un piccolo gesto può cambiare una vita… <br> Diamoci una zampa!</p>
        </div>
    </section>

    <p class="green-center-text">Cerca qui il tuo nuovo compagno a 4 zampe</p>

<section class="filter-section">
  <div class="filter-box">
  <form method="get" action="/filtrati">
  <div class="grid">
    <div class="filter-field">
      <label for="specie">Specie</label>
      <select name="specie" id="specie">
        <option value="" selected>Tutto</option>
        <option th:each="specie : ${specieList}"
                th:value="${specie.IdSpecie}"
                th:text="${specie.nome}">
        </option>
      </select>
    </div>

    <div class="filter-field">
      <label for="razza">Razza</label>
      <select name="razza" id="razza">
        <option value="" selected>Tutto</option>
        <option th:each="razza : ${razzaList}"
                th:value="${razza.idRazza}"
                th:text="${razza.nome}">
        </option>
      </select>
    </div>

    <div class="filter-field">
      <label for="sesso">Sesso</label>
      <select name="sesso" id="sesso">
        <option value="" selected>Tutto</option>
        <option th:each="sesso : ${sessoList}"
                th:value="${sesso[0]}"
                th:text="${sesso}"></option>
      </select>
    </div>
  </div>

  <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
    <button type="submit">Applica Filtri</button>
    <button type="reset">Reset Filtri</button>
  </div>
</form>

  </div>
</section>



    <section class="animal-cards-section">
        <div class="animal-grid">
            <a th:href="@{/animale/{id}(id=${animale.idAnimale})}" class="animal-link" th:each="animale : ${animali}">
                <div class="animal-card">
                    <img th:if="${immaginiPrincipali[animale.idAnimale].isPresent()}" 
                         th:src="@{'/immagini/' + ${immaginiPrincipali[animale.idAnimale].get().id_immagine}}" 
                         th:alt="${animale.nome}" />
                    <img th:unless="${immaginiPrincipali[animale.idAnimale].isPresent()}" 
                         src="../images/prova_foto.webp" 
                         th:alt="${animale.nome}" />
                    <div class="animal-info">
                        <p class="animal-name" th:text="${animale.nome}">Nome Animale</p>
                        <p class="animal-meta">
                        <span th:text="${animale.sesso}">Sesso</span> • 
                        <span th:text="${animale.razza.nome}">Razza</span>
                        </p>
                        <p class="animal-description" th:text="${animale.descrizioneBreve}">Descrizione breve</p>
                    </div>
                </div>
            </a>
        </div>

    </section>

    <script>
        // JavaScript per il filtro dinamico delle razze
        document.addEventListener('DOMContentLoaded', function() {
            const specieSelect = document.getElementById('specie');
            const razzaSelect = document.getElementById('razza');
            
            // Salva tutte le opzioni originali delle razze
            const originalRazzeOptions = Array.from(razzaSelect.querySelectorAll('option')).slice(1); // esclude "Tutto"
            
            specieSelect.addEventListener('change', function() {
                const selectedSpecieId = this.value;
                
                // Rimuovi tutte le opzioni tranne "Tutto"
                razzaSelect.innerHTML = '<option value="" selected>Tutto</option>';
                
                if (selectedSpecieId === '') {
                    // Se nessuna specie è selezionata, mostra tutte le razze
                    originalRazzeOptions.forEach(option => {
                        razzaSelect.appendChild(option.cloneNode(true));
                    });
                } else {
                    // Fetch delle razze utilizzate dagli animali per la specie selezionata
                    fetch(`/api/razze/specie/${selectedSpecieId}/utilizzate`)
                        .then(response => response.json())
                        .then(razze => {
                            razze.forEach(razza => {
                                const option = document.createElement('option');
                                option.value = razza.idRazza;
                                option.textContent = razza.nome;
                                razzaSelect.appendChild(option);
                            });
                        })
                        .catch(error => {
                            console.error('Errore nel caricamento delle razze utilizzate:', error);
                            // In caso di errore, ripristina tutte le razze
                            originalRazzeOptions.forEach(option => {
                                razzaSelect.appendChild(option.cloneNode(true));
                            });
                        });
                }
                
                // Reset della selezione della razza
                razzaSelect.value = '';
            });
        });
    </script>

</body>

<th:block th:replace="fragments/footer :: customFooter"></th:block>

</html>

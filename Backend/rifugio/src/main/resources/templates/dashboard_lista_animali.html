<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Nome.com</title>

    <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>

<body>
    <div class="container">
        <h1>Lista Animali</h1>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>     
                    <th>Specie</th>
                    <th>Razza</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="animale:${animali}">
                    <td th:text="${animale.nome}"></td>   
                    <td th:text="${animale.specie.nome}"></td>   
                    <td th:text="${animale.razza.nome}"></td>   
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamoci una zampa - Lista Utenti</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

        <th:block th:replace="fragments/sidebar :: customSidebar"></th:block>

        <div class="main-content">
            <h1 class="page-title">
                Lista Utenti
                <span th:if="${mostraTutti}" class="status-badge status-deleted">Inclusi Eliminati</span>
                <span th:unless="${mostraTutti}" class="status-badge status-active">Solo Attivi</span>
            </h1>

            <!-- Messaggi di successo/errore -->
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            
            <!-- Toggle per mostrare/nascondere utenti eliminati -->
            <form th:action="@{/dashboard/admin/utenti/toggle-view}" method="post" style="display:inline;">
                <button type="submit" class="toggle-view-btn">
                    <i class="fas fa-eye" th:if="${!mostraTutti}"></i>
                    <i class="fas fa-eye-slash" th:if="${mostraTutti}"></i>
                    <span th:if="${!mostraTutti}">Mostra Anche Eliminati</span>
                    <span th:if="${mostraTutti}">Mostra Solo Attivi</span>
                </button>
            </form>
            <section class="green-section">

                
            <!-- Sezione Filtri -->
            <div class="filter-container">
                <div class="filter-header">
                    <i class="fas fa-filter"></i>
                    <h3>Filtri di Ricerca</h3>
                </div>
                <form method="get" action="/dashboard/admin/utenti" class="filter-form">
                    <!-- Campo nascosto per mantenere lo stato di visualizzazione -->
                    <input type="hidden" name="preserveView" value="true" />
                    
                    <div class="filter-field">
                        <label for="ruolo">Ruolo:</label>
                        <select name="ruolo" id="ruolo" class="filter-select">
                            <option value="">Tutti i ruoli</option>
                            <option value="USER" th:selected="${param.ruolo == 'USER'}">USER</option>
                            <option value="ADMIN" th:selected="${param.ruolo == 'ADMIN'}">ADMIN</option>
                        </select>
                    </div>
                    <div class="filter-field">
                        <label for="nome">Nome:</label>
                        <input type="text" name="nome" id="nome" class="filter-input" 
                               placeholder="Es: Mario, Luca..." th:value="${param.nome}" />
                    </div>
                    <div class="filter-field">
                        <label for="cognome">Cognome:</label>
                        <input type="text" name="cognome" id="cognome" class="filter-input" 
                               placeholder="Es: Rossi, Bianchi..." th:value="${param.cognome}" />
                    </div>
                    <div class="filter-field">
                        <label for="email">Email:</label>
                        <input type="text" name="email" id="email" class="filter-input" 
                               placeholder="Es: mario@email.com..." th:value="${param.email}" />
                    </div>
                    <div class="filter-field">
                        <label for="codiceFiscale">Codice Fiscale:</label>
                        <input type="text" name="codiceFiscale" id="codiceFiscale" class="filter-input" 
                               placeholder="Es: RSSMRA..." th:value="${param.codiceFiscale}" />
                    </div>
                    <div class="filter-actions">
                        <button type="submit" class="btn-filter">
                            <i class="fas fa-search"></i> Filtra
                        </button>
                        <button type="button" onclick="resetFilters()" class="btn-reset">
                            <i class="fas fa-times"></i> Reset
                        </button>
                    </div>
                </form>
            </div>


                <table class="animal-table">
                    <thead>
                        <a th:href="@{/dashboard/admin/utenti/save}" class="add-btn">Aggiungi Nuovo Utente</a>
                        <tr>
                            <th>Id</th>
                            <th>Nome</th>
                            <th>Cognome</th>
                            <th>Email</th>
                            <th>Codice Fiscale</th>
                            <th>Ruolo</th>
                            <th>Status</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="utente : ${utenti}" 
                            th:class="${utente.attivo == false ? 'soft-deleted' : ''}">
                            <td th:text="${utente.id_persona}">1</td>
                            <td>
                                <a th:href="@{/utenti/dettaglio/{id}(id=${utente.id_persona})}"
                                   th:text="${utente.nome}"
                                   class="animal-link">
                                </a>
                            </td>
                            <td th:text="${utente.cognome}">Cognome</td>
                            <td th:text="${utente.email}">email@email.com</td>
                            <td th:text="${utente.codiceFiscale}">CodiceFiscale</td>
                            <td th:text="${utente.ruolo}">Ruolo</td>
                            <td>
                                <span th:if="${utente.attivo == true}" class="status-badge status-active">
                                    <i class="fas fa-check-circle"></i> Attivo
                                </span>
                                <span th:if="${utente.attivo == false}" class="status-badge status-deleted">
                                    <i class="fas fa-times-circle"></i> Eliminato
                                </span>
                            </td>
                            <td>
                                <!-- Azioni per utenti attivi -->
                                <div th:if="${utente.attivo == true}">
                                    <a th:href="@{/dashboard/admin/utenti/update/{id}(id=${utente.id_persona})}" 
                                       class="action-icon-btn" title="Modifica">
                                        <i class="fa fa-edit"></i>
                                    </a>
                                    <a th:href="@{/utenti/dettaglio/{id}(id=${utente.id_persona})}" 
                                       class="action-icon-btn" title="Dettagli">
                                        <i class="fa fa-eye"></i>
                                    </a>
                                    <form th:action="@{/dashboard/admin/utenti/delete/{id}(id=${utente.id_persona})}" 
                                          method="post" style="display:inline;">
                                        <button type="submit" class="action-icon-btn delete-btn" title="Elimina (Soft Delete)" 
                                                onclick="return confirm('Sei sicuro di voler eliminare questo utente? Potrà essere ripristinato successivamente.');">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                                
                                <!-- Azioni per utenti eliminati -->
                                <div th:if="${utente.attivo == false}">
                                    <a th:href="@{/utenti/dettaglio/{id}(id=${utente.id_persona})}" 
                                       class="action-icon-btn" title="Dettagli">
                                        <i class="fa fa-eye"></i>
                                    </a>
                                    <form th:action="@{/dashboard/admin/utenti/restore/{id}(id=${utente.id_persona})}" 
                                          method="post" style="display:inline;">
                                        <button type="submit" class="action-icon-btn" title="Ripristina Utente"
                                                style="background-color: #4CAF50; color: white;"
                                                onclick="return confirm('Sei sicuro di voler ripristinare questo utente?');">
                                            <i class="fa fa-undo"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/dashboard/admin/utenti/hard-delete/{id}(id=${utente.id_persona})}" 
                                          method="post" style="display:inline;">
                                        <button type="submit" class="action-icon-btn delete-btn" title="Elimina Definitivamente"
                                                style="background-color: #d32f2f;"
                                                onclick="return confirm('ATTENZIONE: Questa azione eliminerà DEFINITIVAMENTE l\'utente dal database. Non potrà essere ripristinato. Continuare?');">
                                            <i class="fa fa-trash-alt"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>

            </section>
        </div>

    </body>
    
    <script>
        function resetFilters() {
            document.getElementById('ruolo').value = '';
            document.getElementById('nome').value = '';
            document.getElementById('cognome').value = '';
            document.getElementById('email').value = '';
            document.getElementById('codiceFiscale').value = '';
            // Ricarica la pagina mantenendo solo lo stato di visualizzazione utenti eliminati
            window.location.href = '/dashboard/admin/utenti';
        }
    </script>

</html>

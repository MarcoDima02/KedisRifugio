<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8" />
    <title>Diamoci una zampa - Modifica Visita Veterinaria</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/forms.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div th:replace="fragments/sidebar :: customSidebar"></div>
    
    <div class="main-content">
        <div class="filter-box animale-form-box">
            
            <!-- Header del form -->
            <div class="form-header">
                <h2><i class="fas fa-edit"></i> Modifica Visita Veterinaria</h2>
            </div>

            <!-- Form -->
            <form th:action="@{/dashboard/admin/visite-veterinarie/update/{id}(id=${visita.id_visita})}" th:object="${visita}" method="post" novalidate>
                <input type="hidden" th:field="*{id_visita}" />
                
                <!-- Messaggi di errore globali -->
                <div th:if="${#fields.hasErrors()}" class="error-message" style="display:block; margin-bottom: 1.5rem;">
                    <ul>
                        <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                    </ul>
                </div>

                <!-- Grid per organizzare i campi -->
                <div class="form-grid">
                    
                    <!-- Informazioni Temporali -->
                    <div class="form-section">
                        <h3><i class="fas fa-calendar-alt"></i> Data e Ora</h3>
                        
                        <div class="filter-field">
                            <label for="data">Data</label>
                            <input type="text" id="data" th:field="*{data}" required pattern="\d{2}/\d{2}/\d{4}" placeholder="gg/mm/aaaa" />
                            <div th:if="${#fields.hasErrors('data')}" class="error-message" th:errors="*{data}"></div>
                            <div th:if="${visita.data == null}" class="error-message">Attenzione: la data non è valorizzata, inseriscila per continuare.</div>
                        </div>
                        
                        <div class="filter-field">
                            <label for="ora">Ora</label>
                            <input type="time" id="ora" th:field="*{ora}" required />
                            <div th:if="${#fields.hasErrors('ora')}" class="error-message" th:errors="*{ora}"></div>
                        </div>
                    </div>

                    <!-- Informazioni Animale -->
                    <div class="form-section">
                        <h3><i class="fas fa-paw"></i> Animale</h3>
                        
                        <div class="filter-field">
                            <label for="id_animale">Seleziona Animale</label>
                            <select id="id_animale" th:field="*{id_animale}" required>
                                <option value="" disabled>-- Seleziona --</option>
                                <option th:each="animale : ${animali}"
                                        th:value="${animale.idAnimale}"
                                        th:text="${animale.nome} + ' (' + ${animale.idAnimale} + ')'"
                                        th:selected="${animale.idAnimale == visita.id_animale?.idAnimale}">
                                </option>
                            </select>
                            <div th:if="${#fields.hasErrors('id_animale')}" class="error-message" th:errors="*{id_animale}"></div>
                        </div>
                    </div>

                    <!-- Dettagli Visita -->
                    <div class="form-section form-section-full">
                        <h3><i class="fas fa-stethoscope"></i> Dettagli della Visita</h3>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="filter-field">
                                <label for="motivo">Motivo della Visita</label>
                                <input type="text" id="motivo" th:field="*{motivo}" maxlength="100" required placeholder="Descrivi il motivo della visita" />
                                <div th:if="${#fields.hasErrors('motivo')}" class="error-message" th:errors="*{motivo}"></div>
                            </div>
                            
                            <div class="filter-field">
                                <label for="esito">Esito</label>
                                <select id="esito" th:field="*{esito}" required>
                                    <option value="">-- Seleziona --</option>
                                    <option value="In attesa">In attesa</option>
                                    <option value="Effettuata">Effettuata</option>
                                    <option value="Posticipata">Posticipata</option>
                                    <option value="Annullata">Annullata</option>
                                </select>
                                <div th:if="${#fields.hasErrors('esito')}" class="error-message" th:errors="*{esito}"></div>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Azioni del form -->
                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Salva Modifiche
                    </button>
                    <button type="reset" class="btn btn-secondary">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                    <a th:href="@{/dashboard/admin/visite-veterinarie}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Torna alla Lista
                    </a>
                </div>

            </form>
        </div>
    </div>
    
</body>
</html>

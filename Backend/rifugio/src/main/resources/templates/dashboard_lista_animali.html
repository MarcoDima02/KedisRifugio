<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Diamoci una zampa</title>
        <link rel="icon" type="image/png" href="/images/logo.png">
        <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" /> -->
        <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
        <link rel="stylesheet" th:href="@{/css/styles.css}" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>
        
        <th:block th:replace="fragments/sidebar :: customSidebar"></th:block>
        
        <div class="main-content">
            <h1 class="page-title">
                Lista Anagrafica Animali
            </h1>
            
            <section class="green-section">
                <a th:href="@{/dashboard/admin/animali/save}" class="add-btn">Aggiungi Nuovo Animale</a>
                
                <!-- Sezione Filtri -->
                <div class="filter-box" style="margin-bottom: 2rem; padding: 1.5rem; background-color: #17613a; border-radius: 8px;">
                    <h3 style="color: white; margin-bottom: 1rem; text-align: center;">
                        <i class="fas fa-filter"></i> Filtri di Ricerca
                    </h3>
                    <form method="get" action="/dashboard/admin/animali" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; align-items: end;">
                        <div class="filter-field">
                            <label for="specie" style="color: white; font-weight: 600; margin-bottom: 0.5rem; display: block;">Specie:</label>
                            <select name="specie" id="specie" class="form-control" style="padding: 0.5rem; border-radius: 4px; border: none;">
                                <option value="">Tutte le specie</option>
                                <option th:each="s : ${specie}" th:value="${s.idSpecie}" th:text="${s.nome}" th:selected="${param.specie == s.idSpecie}"></option>
                            </select>
                        </div>
                        <div class="filter-field">
                            <label for="razza" style="color: white; font-weight: 600; margin-bottom: 0.5rem; display: block;">Razza:</label>
                            <select name="razza" id="razza" class="form-control" style="padding: 0.5rem; border-radius: 4px; border: none;">
                                <option value="">Tutte le razze</option>
                                <option th:each="r : ${razze}" th:value="${r.idRazza}" th:text="${r.nome}" th:selected="${param.razza == r.idRazza}"></option>
                            </select>
                        </div>
                        <div class="filter-field">
                            <label for="sesso" style="color: white; font-weight: 600; margin-bottom: 0.5rem; display: block;">Sesso:</label>
                            <select name="sesso" id="sesso" class="form-control" style="padding: 0.5rem; border-radius: 4px; border: none;">
                                <option value="">Tutti i sessi</option>
                                <option value="M" th:selected="${param.sesso == 'M'}">Maschio</option>
                                <option value="F" th:selected="${param.sesso == 'F'}">Femmina</option>
                            </select>
                        </div>
                        <div class="filter-field" style="display: flex; gap: 0.5rem;">
                            <button type="submit" style="background-color: #28a745; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: 600;">
                                <i class="fas fa-search"></i> Filtra
                            </button>
                            <button type="button" onclick="resetFilters()" style="background-color: #dc3545; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: 600;">
                                <i class="fas fa-times"></i> Reset
                            </button>
                        </div>
                    </form>
                </div>
                
                <table class="animal-table">
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Nome</th>
                            <th>Specie</th>
                            <th>Razza</th>
                            <th>Sesso</th>
                            <th>Data Nascita</th>
                            <th>Data Arrivo</th>
                            <th>Stato</th>
                            <th>Azioni</th> <!-- Nuova colonna per il pulsante -->
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="animale : ${animali}">
                            <td th:text="${animale.idAnimale}">1</td>
                            <td>
                                <a th:href="@{/dashboard/admin/animali/{id}(id=${animale.idAnimale})}"
                                th:text="${animale.nome}"
                                class="animal-link">
                                </a>
                            </td>
                            <td th:text="${animale.specie.nome}">Specie</td>
                            <td th:text="${animale.razza.nome}">Razza</td>
                            <td th:text="${animale.sesso}">Sesso</td>
                            <td th:text="${#dates.format(animale.dataNascita, 'dd/MM/yyyy')}">01/01/2020</td>
                            <td th:text="${#dates.format(animale.dataArrivo, 'dd/MM/yyyy')}">01/06/2020</td>
                            <td th:text="${animale.idStatoAnimale.descrizione}">Stato</td>
                            <td>
                                <a th:href="@{/dashboard/admin/animali/update/{id}(id=${animale.idAnimale})}" class="action-icon-btn" title="Modifica">
                                    <i class="fa fa-edit"></i>
                                </a>
                                <a th:href="@{/dashboard/admin/animali/{id}(id=${animale.idAnimale})}" class="action-icon-btn" title="Dettagli">
                                    <i class="fa fa-eye"></i>
                                </a>
                                
                            </td>
                        </tr>
                    </tbody>

                </table>

    <script>
        function resetFilters() {
            // Reset tutti i select ai valori di default
            document.getElementById('specie').value = '';
            document.getElementById('razza').value = '';
            document.getElementById('sesso').value = '';
            
            // Ricarica la pagina senza parametri di filtro
            window.location.href = '/dashboard/admin/animali';
        }
    </script>

    </body>
</html>

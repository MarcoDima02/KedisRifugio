<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Utenti</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
    <th:block th:replace="fragments/header :: customHeader"></th:block>
    <div class="container" style="margin-top:40px;">
        <h1>Lista Utenti</h1>
        <table class="user-table" style="width:100%; border-collapse:collapse; margin-top:20px;">
            <thead>
                <tr style="background:#eafbee;">
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Cognome</th>
                    <th>Email</th>
                    <th>Codice Fiscale</th>
                    <th>Ruolo</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="utente : ${utenti}">
                    <td th:text="${utente.id_persona}"></td>
                    <td th:text="${utente.nome}"></td>
                    <td th:text="${utente.cognome}"></td>
                    <td th:text="${utente.email}"></td>
                    <td th:text="${utente.codiceFiscale}"></td>
                    <td th:text="${utente.ruolo}"></td>
                    <td>
                        <a th:href="@{'/utenti/dettaglio/' + ${utente.id_persona}}">Dettaglio</a> |
                        <a th:href="@{'/utenti/modifica/' + ${utente.id_persona}}">Modifica</a> |
                        <form th:action="@{'/utenti/elimina/' + ${utente.id_persona}}" method="post" style="display:inline;">
                            <button type="submit" onclick="return confirm('Sei sicuro di voler eliminare questo utente?');">Elimina</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>

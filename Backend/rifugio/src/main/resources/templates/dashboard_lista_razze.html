<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamoci una zampa</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <th:block th:replace="fragments/sidebar :: customSidebar"></th:block>
    
    <div class="main-content">
        <h1 class="page-title">
            Lista Razze
        </h1>
        
        <section class="green-section">
                <a th:href="@{/dashboard/admin/razze/save}" class="add-btn">Aggiungi Razza</a>
                
                <!-- Sezione Filtri -->
                <div class="filter-container">
                    <div class="filter-header">
                        <i class="fas fa-filter"></i>
                        <h3>Filtri di Ricerca</h3>
                    </div>
                    <form method="get" action="/dashboard/admin/razze" class="filter-form">
                        <div class="filter-field">
                            <label for="specie">Specie:</label>
                            <select name="specie" id="specie" class="filter-select">
                                <option value="">Tutte le specie</option>
                                <option th:each="s : ${specie}" th:value="${s.idSpecie}" th:text="${s.nome}" th:selected="${param.specie == s.idSpecie}"></option>
                            </select>
                        </div>
                        <div class="filter-actions">
                            <button type="submit" class="btn-filter">
                                <i class="fas fa-search"></i> Filtra
                            </button>
                            <button type="button" onclick="resetFilters()" class="btn-reset">
                                <i class="fas fa-times"></i> Reset
                            </button>
                        </div>
                    </form>
                </div>
                
                <table class="animal-table">
                    <thead>
                        <tr>
                            <th>Id Razza</th>
                            <th>Nome</th>
                            <th>Id Specie</th>
                            <th>Specie</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="razza : ${razze}">
                            <td th:text="${razza.idRazza}">1</td>
                            <td th:text="${razza.nome}">Nome</td>
                            <td th:text="${razza.specie.idSpecie}">1</td>
                            <td th:text="${razza.specie.nome}">Nome</td>
                            <td>
                                <a th:href="@{/dashboard/admin/razze/update/{id}(id=${razza.idRazza})}" class="action-icon-btn" title="Modifica">
                                    <i class="fa fa-edit"></i>
                                </a>
                                
                            </td>
                        </tr>
                    </tbody>
                </table>

                
            </section>
        </div>

    </body>
    
    <script>
        function resetFilters() {
            const specieSelect = document.getElementById('specie');
            specieSelect.value = '';
            // Submit the form to reload the page with cleared filters
            document.querySelector('.filter-form').submit();
        }
    </script>

</html>

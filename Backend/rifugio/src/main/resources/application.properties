

# con create, viene sempre sovrascritto
# con create-drop, viene sovrascritto solo al primo avvio
# con udate, ogni volta che viene effettuata una modifica al modello, viene aggiornata la struttura del database

spring.application.name=rifugio
    
# DATABASE
spring.datasource.url=jdbc:h2:mem:rifugio;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.url=jdbc:h2:file:./data/rifugio
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=kedis
spring.datasource.password=
    
# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# SQL
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql


# File Upload Settings
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
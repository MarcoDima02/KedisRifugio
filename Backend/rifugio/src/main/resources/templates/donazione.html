<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
    
    <th:block th:replace="fragments/header :: customHeader"></th:block>

    <h1 class="page-title">Fai una donazione</h1>

    <div class="green-section">
        <form class="donazione-form" action="/donazione">
            <div class="form-group">
                <label for="importo">Importo (€)</label>
                <input type="number" step="0.01" min="1" id="importo" name="importo" required placeholder="Inserisci l'importo">
            </div>
            <div class="form-group">
                <label for="descrizione">Descrizione (opzionale)</label>
                <textarea id="descrizione" name="descrizione" rows="3" placeholder="Motivo della donazione o messaggio"></textarea>
            </div>
            <button type="submit" class="donazioni-btn">Dona ora</button>
        </form>
    </div>

    <th:block th:replace="fragments/footer :: customFooter"></th:block>

</body>
</html>

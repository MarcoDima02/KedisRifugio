<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamoci una zampa - Lista Utenti</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

        <th:block th:replace="fragments/sidebar :: customSidebar"></th:block>

        <div class="main-content">
            <h1 class="page-title">
                Lista Utenti
            </h1>

            <!-- Messaggi di successo/errore -->
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <section class="green-section">
                <table class="animal-table">
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Nome</th>
                            <th>Cognome</th>
                            <th>Email</th>
                            <th>Codice Fiscale</th>
                            <th>Ruolo</th>
                            <th>Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="utente : ${utenti}">
                            <td th:text="${utente.id_persona}">1</td>
                            <td>
                                <a th:href="@{/utenti/dettaglio/{id}(id=${utente.id_persona})}"
                                   th:text="${utente.nome}"
                                   class="animal-link">
                                </a>
                            </td>
                            <td th:text="${utente.cognome}">Cognome</td>
                            <td th:text="${utente.email}">email@email.com</td>
                            <td th:text="${utente.codiceFiscale}">CodiceFiscale</td>
                            <td th:text="${utente.ruolo}">Ruolo</td>
                            <td>
                                <a th:href="@{/dashboard/admin/utenti/update/{id}(id=${utente.id_persona})}" class="action-icon-btn" title="Modifica">
                                    <i class="fa fa-edit"></i>
                                </a>
                                <a th:href="@{/utenti/dettaglio/{id}(id=${utente.id_persona})}" class="action-icon-btn" title="Dettagli">
                                    <i class="fa fa-eye"></i>
                                </a>
                                <form th:action="@{/dashboard/admin/utenti/delete/{id}(id=${utente.id_persona})}" method="post" style="display:inline;">
                                    <button type="submit" class="action-icon-btn delete-btn" title="Elimina" 
                                            onclick="return confirm('Sei sicuro di voler eliminare questo utente? Questa azione non può essere annullata.');">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <a th:href="@{/dashboard/admin/utenti/save}" class="add-btn">Aggiungi Nuovo Utente</a>
            </section>
        </div>

    </body>
</html>

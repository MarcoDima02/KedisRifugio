<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamoci una zampa - Dettaglio Utente</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/details-pages.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
    <th:block th:replace="fragments/sidebar :: customSidebar"></th:block>
    
    <div class="main-content">
        <div class="details-container">
            <div class="details-header">
                <h1><i class="fas fa-user"></i> Dettaglio Utente</h1>
                <p>Informazioni complete dell'utente registrato</p>
            </div>
            
            <div class="details-grid">
                <!-- Informazioni Personali -->
                <div class="detail-section">
                    <h3><i class="fas fa-id-card"></i> Informazioni Personali</h3>
                    <div class="detail-item">
                        <div class="detail-label">Nome</div>
                        <div class="detail-value" th:text="${utente.nome}"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Cognome</div>
                        <div class="detail-value" th:text="${utente.cognome}"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Codice Fiscale</div>
                        <div class="detail-value" th:text="${utente.codiceFiscale}"></div>
                    </div>
                </div>
                
                <!-- Informazioni di Contatto -->
                <div class="detail-section">
                    <h3><i class="fas fa-address-book"></i> Contatti</h3>
                    <div class="detail-item">
                        <div class="detail-label">Email</div>
                        <div class="detail-value" th:text="${utente.email}"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Numero di Telefono</div>
                        <div class="detail-value" th:text="${utente.numero}"></div>
                    </div>
                </div>
                
                <!-- Informazioni di Sistema -->
                <div class="detail-section">
                    <h3><i class="fas fa-cog"></i> Sistema</h3>
                    <div class="detail-item">
                        <div class="detail-label">Ruolo</div>
                        <div class="detail-value">
                            <span class="status-badge" 
                                  th:classappend="${utente.ruolo == 'ADMIN'} ? 'status-approved' : 'status-pending'"
                                  th:text="${utente.ruolo}"></span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">Stato Account</div>
                        <div class="detail-value">
                            <span class="status-badge" 
                                  th:classappend="${utente.attivo == true} ? 'status-approved' : 'status-danger'"
                                  th:text="${utente.attivo == true} ? 'Attivo' : 'Eliminato'"></span>
                        </div>
                    </div>
                    
                </div>
            </div>
            
            <div class="action-buttons">
                <a th:href="@{/dashboard/admin/utenti/update/{id}(id=${utente.id_persona})}" class="btn btn-primary">
                    <i class="fas fa-edit"></i> Modifica Utente
                </a>
                <a th:href="@{/dashboard/admin/utenti}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Torna alla Lista
                </a>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8" />
    <title>Diamoci una zampa - Modifica Donazione</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/forms.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <th:block th:replace="fragments/sidebar :: customSidebar"></th:block>

    <div class="main-content">
        <div class="filter-box animale-form-box">
            
            <!-- Header del form -->
            <div class="form-header">
                <h2><i class="fas fa-edit"></i> Modifica Donazione</h2>
            </div>

            <!-- Form -->
            <form th:action="@{/dashboard/admin/donazioni/update/{id}(id=${donazione.id_donazione})}" th:object="${donazione}" method="post" novalidate>
                
                <!-- Grid per organizzare i campi -->
                <div class="form-grid">
                    
                    <!-- Dettagli Donazione -->
                    <div class="form-section form-section-full">
                        <h3><i class="fas fa-heart"></i> Dettagli Donazione</h3>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="filter-field">
                                <label for="importo">Importo (€)</label>
                                <input type="number" id="importo" th:field="*{importo}" 
                                       min="1.00"  step="1.00" required />
                                <small class="form-help">Importo minimo: €1.00</small>
                            </div>
                            
                            <div class="filter-field">
                                <label for="data_donazione"><i class="fas fa-calendar-day"></i> Data di Donazione</label>
                                <input type="date" id="data_donazione" th:field="*{data_donazione}" required
                                       th:max="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" />
                                <small class="form-help">La data di donazione non può essere nel futuro</small>
                            </div>
                        </div>
                        
                        <div class="filter-field">
                            <label for="descrizione">Descrizione</label>
                            <textarea id="descrizione" th:field="*{descrizione}" rows="3" placeholder="Descrizione o motivazione della donazione"></textarea>
                        </div>
                    </div>

                </div>

                <!-- Azioni del form -->
                <div class="action-buttons">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Salva Modifiche
                    </button>
                    <button type="reset" class="btn btn-secondary">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                    <a href="/dashboard/admin/donazioni" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Torna alla Lista
                    </a>
                </div>

            </form>
        </div>
    </div>

</body>
</html>

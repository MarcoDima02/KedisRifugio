<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuovo Utente - Admin</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/forms.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div th:insert="fragments/sidebar :: customSidebar"></div>

    <main class="dashboard-main">
        <div class="dashboard-header">
            <h1>Crea Nuovo Utente</h1>
            <a th:href="@{/dashboard/admin/utenti}" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> Torna agli utenti
            </a>
        </div>

        <div class="form-container">
            <form th:action="@{/dashboard/admin/utenti/save}" th:object="${utente}" method="post" class="animal-form">
                <div class="form-section">
                    <h3>Informazioni Personali</h3>
                    
                    <div class="form-field">
                        <label for="nome">Nome:</label>
                        <input type="text" th:field="*{nome}" id="nome" class="form-control" required maxlength="50">
                    </div>

                    <div class="form-field">
                        <label for="cognome">Cognome:</label>
                        <input type="text" th:field="*{cognome}" id="cognome" class="form-control" required maxlength="50">
                    </div>

                    <div class="form-field">
                        <label for="codiceFiscale">Codice Fiscale:</label>
                        <input type="text" th:field="*{codiceFiscale}" id="codiceFiscale" class="form-control" 
                               required maxlength="16">
                    </div>

                    <div class="form-field">
                        <label for="email">Email:</label>
                        <input type="email" th:field="*{email}" id="email" class="form-control" required maxlength="100">
                    </div>

                    <div class="form-field">
                        <label for="numero">Numero di telefono:</label>
                        <input type="tel" th:field="*{numero}" id="numero" class="form-control" maxlength="15">
                    </div>
                </div>

                <div class="form-section">
                    <h3>Credenziali e Ruolo</h3>
                    
                    <div class="form-field">
                        <label for="password">Password:</label>
                        <input type="password" th:field="*{password}" id="password" class="form-control" 
                               placeholder="Lascia vuoto per password predefinita (password123)">
                    </div>

                    <div class="form-field">
                        <label for="ruolo">Ruolo:</label>
                        <select th:field="*{ruolo}" id="ruolo" class="form-control" required>
                            <option value="USER">Utente</option>
                            <option value="ADMIN">Amministratore</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-save"></i> Crea Utente
                    </button>
                    <a th:href="@{/dashboard/admin/utenti}" class="btn btn-secondary">
                        <i class="fa-solid fa-times"></i> Annulla
                    </a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>

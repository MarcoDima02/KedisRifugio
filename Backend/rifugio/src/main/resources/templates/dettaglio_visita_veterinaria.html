<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
    <meta charset="UTF-8" />
    <title>Dettaglio Visita Veterinaria</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Stili custom spostati in styles.css -->
</head>
<body>
<section>
  <div class="visita-card">
    <h2 class="form-title"><i class="fa-solid fa-notes-medical"></i> Dettaglio Visita Veterinaria</h2>
    <dl class="visita-details">
      <dt><i class="fa-solid fa-hashtag"></i> ID Visita</dt>
      <dd th:text="${visita.id_visita}"></dd>
      <dt><i class="fa-solid fa-calendar-day"></i> Data</dt>
      <dd th:text="${#temporals.format(visita.data, 'dd/MM/yyyy')}"></dd>
      <dt><i class="fa-solid fa-clock"></i> Ora</dt>
      <dd th:text="${#temporals.format(visita.ora, 'HH:mm')}"></dd>
      <dt><i class="fa-solid fa-dog"></i> Animale</dt>
      <dd th:text="${visita.id_animale.nome + ' (' + visita.id_animale.idAnimale + ')'}"></dd>
      <dt><i class="fa-solid fa-stethoscope"></i> Motivo</dt>
      <dd th:text="${visita.motivo}"></dd>
      <dt><i class="fa-solid fa-clipboard-check"></i> Esito</dt>
      <dd th:text="${visita.esito}"></dd>
    </dl>
    <div class="action-buttons">
      <a th:href="@{/dashboard/admin/visite-veterinarie}" class="secondary"><i class="fa-solid fa-arrow-left"></i> Torna alla lista</a>
      <a th:href="@{/dashboard/admin/visite-veterinarie/update/{id}(id=${visita.id_visita})}" class="primary"><i class="fa-solid fa-pen-to-square"></i> Modifica Visita</a>
    </div>
  </div>
</section>
</body>
</html>
